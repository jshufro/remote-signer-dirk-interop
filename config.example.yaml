log_level: "debug"
log_format: "json"
listen_address: "0.0.0.0"
listen_port: 9090
metrics:
  listen_address: "0.0.0.0"
  # It's generally safe to use the same port as the main server, if you want.
  listen_port: 9091
dirk:
  timeout: 4s
  # Dirk endpoints: "host:port" or "domain:port" (no scheme).
  endpoints:
    - "dirk.example.com:9091"
    - "dirk-two.example.com:9091"
  wallet: "wallet-name"

# TLS for authing to Dirk
ssl:
  refresh_threshold: 24h
  refresh_retry: 10m
  cert: "/path/to/server.crt"
  privkey: "/path/to/server.key"
  # Optional: root CA for verifying Dirk servers (omit to use system pool)
  root_ca: "/path/to/ca.crt"

# Optional: network is either mainnet, holesky, hoodi, or sepolia
# Alternatively, set network to a 0x-prefixed hex string representing the genesis fork version
# of your custom network (e.g. 0x10000910 would be hoodi)
# Default is mainnet
network: "mainnet"
