package: api 
generate:
  models: true
output: generated/api/schemas.gen.go
output-options:
  skip-prune: true
  prefer-skip-optional-pointer: true
  exclude-schemas:
    - "AggregateAndProofPhase0"
    - "AggregateAndProofElectra"
    - "AttestationData"
    - "Checkpoint"
    - "BeaconBlock"
    - "BeaconBlockAltair"
    - "BeaconBlockHeader"
    - "BeaconBlockBody"
    - "VoluntaryExit"
    - "SyncCommitteeContribution"
    - "SyncAggregatorSelectionData"
    - "ContributionAndProof"
    - "ValidatorRegistration"
    # Deprecated schemas
    - "BlockSigning"
    - "AggregateAndProofSigning"
